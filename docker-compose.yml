services:
  db:
    image: mysql:8.4.9
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - ./database/create_database.sql:/docker-entrypoint-initdb.d/init.sql
      - database-data:/var/lib/mysql
    command: --max_connections=500
    healthcheck:
      test: ["CMD", "mysql", "-uroot", "-p${MYSQL_ROOT_PASSWORD}", "-e", "SELECT 1;"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s 

  link-service:
    build: ./link-service
    image: my-link-service:latest
    restart: always
    init: true 
    ports:
      - "${LINK_SERVICE_HOST_PORT}:${LINK_SERVICE_CONTAINER_PORT}"
    environment:
      DB_HOST: db
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_DATABASE: ${MYSQL_DATABASE}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "apk", "add", "--no-cache", "curl", "&&", "curl", "-f", "http://localhost:${LINK_SERVICE_CONTAINER_PORT}/api/v1/links"]
      interval: 10s
      timeout: 5s
      retries: 3

  web-app:
    build: .
    image: my-web-app:latest
    restart: always
    init: true 
    ports:
      - "${WEB_APP_HOST_PORT}:${WEB_APP_CONTAINER_PORT}"
    environment:
      DB_HOST: db
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_DATABASE: ${MYSQL_DATABASE}
      LINK_SERVICE_URL: http://link-service:${LINK_SERVICE_CONTAINER_PORT}/api/v1/links
    depends_on:
      link-service:
        condition: service_healthy 

volumes:
  database-data:
