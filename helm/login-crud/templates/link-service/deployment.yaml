apiVersion: app/v1
kind: Deployment

metadata:
  name: link-service

spec:
  replicas: {{ .Values.linkService.replicaCount }}

  selector:
    matchLabels:
      app: link-service

  template:
    metadata:
      labels:
        app: link-service

  spec:
    containers:
      - name: link-service

        image: "{{ .Values.linkService.image.repository }}:{{ .Values.linkService.image.tag }}"

        ports:
          - containerPort: 3001

        env:
          - name: DB_HOST
            value: mysql

          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: mysql-secret
                key: MYSQL_USER

          - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD

            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE

          readinessProbe:
            httpGet:
              path: /health
              port: 3001

          livenessProbe:
            httpGet:
              path: /health
              port: 3001

          resources:
{{ toYaml .Values.linkService.resources | indent 12 }}
