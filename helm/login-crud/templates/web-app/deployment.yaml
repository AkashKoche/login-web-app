apiVersion: apps/v1
kind: Deployment

metadata:
  name: web-app

spec:
  replicas: {{ .Values.webApp.replicaCount }}

  selector:
    matchLabels:
      app: web-app

  template:
    metadata:
      labels:
        app: web-app

    spec:
      containers:
        - name: web-app

          image: "{{ .Values.webApp.image.repository }}:{{ .Values.webApp.image.tag }}"

          ports:
            - containerPort: 3000

          env:
            - name: DB_HOST
              value: mysql

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD

            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE

            - name: LINK_SERVICE_URL
              value: http://link-service:3001/api/v1/links

          readinessProbe:
            httpGet:
              path: /health
              port: 3000

          livenessProbe:
            httpGet:
              path: /health
              port: 3000

          resources:
{{ toYaml .Values.webApp.resources | indent 12 }}
