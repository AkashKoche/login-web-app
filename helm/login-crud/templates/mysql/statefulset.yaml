apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mysql

spec:
  serviceName: mysql

  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

  spec:
    containers:
      - name: mysql
      
        image: "{{ .Value.mysql.image.repository }}:{{ .Values.mysql.image.tag }}"

        args:
          - --max_connections=500

        ports:
          - containerPort: 3306

        env:
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-secret
                key: MY_SQL_ROOT_PASSWORD

          - name: MYSQL_DATABASE
            valueFrom:
              secretKeyRef:
                name: mysql-secret
                key: MYSQL_DATABASE

          - name: MYSQL_USER
            valueFrom:
              secretKeyRef:
                name: mysql-secret
                key: MYSQL_USER

          - name: MYSQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-secret
                key: MYSQL_PASSWORD

          readinessProbe:
            tcpSocket:
              port: 3306

          livenessProbe:
            tcpSocket:
              port: 3306

          resources:
{{ toYaml .Values.mysql.resources | indent 12 }}

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

  volumeClaimTemplates:
    - metadata:
        name: mysql-storage
      
      spec:
        accessModes:
          - ReadWriteOnce:

        resources:
          requests:
            storage: {{ .Values.mysql.persistence.size }}
