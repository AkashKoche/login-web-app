apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: login-crud
spec:
  serviceName: mysql

  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql
        image: mysql:8.4.9

        args:
        - --max_connections=500

        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_DATABASE

        volumeMounts:
        - name: mysql-init-script
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: mysql-init-script
        configMap:
          name: mysql-init-schema

  volumeClaimTemplates:
  - metadata:
      name: mysql-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
