apiVersion: apps/v1
kind: Deployment
metadata:
  name: link-service
  namespace: login-crud

spec:
  replicas: 2

  selector:
    matchLabels:
      app: link-service

  template:
    metadata:
      labels:
        app: link-service

    spec:
      containers:
      - name: link-service
        image: my-link-service:latest

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3001

        env:
        - name: DB_HOST
          value: mysql

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_PASSWORD

        - name: DB_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_DATABASE
