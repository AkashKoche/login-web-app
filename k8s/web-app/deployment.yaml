apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: login-crud

spec:
  replicas: 2

  selector:
    matchLabels:
      app: web-app

  template:
    metadata:
      labels:
        app: web-app

    spec:
      containers:
      - name: web-app
      
        image: my-web-app:latest

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3000

        env:
        - name: DB_HOST
          value: mysql

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_PASSWORD

        - name: DB_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_DATABASE

        - name: LINK_SERVICE_URL
          value: http://link-service:3001/api/v1/links

